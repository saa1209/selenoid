<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
       h1{
            color: red;
        }
        h2{
            color: brown;
        }
        h3{
            color: blueviolet;
        }
    </style>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <h1>Stylování CSS</h1>
    <!--In-line stylování-->
    <p style="color:aqua">Inline stylování</p>
    <!--internal stylování-->
    <h1>Nadpis první úrovně</h1>
    <h2>nadpis 2. úrovně</h2>
    <h3>nadpis 3. úrovně</h3>

    <!--External style-->
    <p>První odstavec</p>
    <p>druhý odstavec</p>
    <p>třetí odstavec</p>
    <p>čtvrtý odstavec</p>
</body>
</html>
